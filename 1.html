<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全国市级交互地图导出工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; display: flex; margin: 0; height: 100vh; background: #f4f7f6; overflow: hidden; }
        /* 侧边栏样式优化，支持滚动 */
        #sidebar { width: 340px; padding: 20px; background: #fff; box-shadow: 2px 0 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; z-index: 10; }
        #map-container { flex-grow: 1; position: relative; }
        #main { width: 100%; height: 100%; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; flex-shrink: 0; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; }
        button.export-btn { background: #28a745; grid-column: span 2; }
        button.export-btn:hover { background: #218838; }
        button.reset-btn { background: #dc3545; }
        button.reset-btn:hover { background: #c82333; }

        .controls { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .controls::-webkit-scrollbar { width: 6px; }
        .controls::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        
        h3 { border-bottom: 2px solid #007bff; padding-bottom: 8px; margin-top: 0; flex-shrink: 0; }
        
        /* 字母分组样式 */
        .category { margin-bottom: 15px; }
        .category h4 { margin: 0 0 8px 0; padding: 5px 10px; background: #e9ecef; border-radius: 4px; font-size: 14px; color: #333; }
        .prov-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .prov-grid label { font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 4px; user-select: none; }
        .prov-grid input[type="checkbox"] { cursor: pointer; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>中国市级地图操作面板</h3>
    <div class="btn-group">
        <button onclick="takeScreenshot()">📷 网页截图</button>
        <button class="reset-btn" onclick="clearAll()">🗑️ 重置地图</button>
        <button class="export-btn" onclick="exportData('red')">📥 导出选中 (红色) 区域</button>
        <button class="export-btn" style="background:#6c757d;" onclick="exportData('none')">📥 导出未选 (无色) 区域</button>
    </div>

    <div class="controls">
        <strong style="display:block; margin-bottom: 10px;">快速联动勾选 (A-Z分类)：</strong>
        <div id="province-list"></div>
    </div>
</div>

<div id="map-container">
    <div id="main"></div>
</div>

<script>
    const chart = echarts.init(document.getElementById('main'));
    let selectedCities = new Set(); // 存储被选中的城市名称
    let allCitiesInMap = []; // 存储地图中存在的所有市级区域名称

    // 全国 34 个省级行政区下辖地级市(及直辖市/特区)的关键词映射表
    // 用于根据用户勾选的省份，在地图 geoJson 中模糊匹配并选中对应的市
    const provinceMap = {
        "安徽": ["合肥", "芜湖", "蚌埠", "淮南", "马鞍山", "淮北", "铜陵", "安庆", "黄山", "滁州", "阜阳", "宿州", "六安", "亳州", "池州", "宣城"],
        "澳门": ["澳门"],
        "北京": ["北京"],
        "重庆": ["重庆"],
        "福建": ["福州", "厦门", "莆田", "三明", "泉州", "漳州", "南平", "龙岩", "宁德"],
        "甘肃": ["兰州", "嘉峪关", "金昌", "白银", "天水", "武威", "张掖", "平凉", "酒泉", "庆阳", "定西", "陇南", "临夏", "甘南"],
        "广东": ["广州", "韶关", "深圳", "珠海", "汕头", "佛山", "江门", "湛江", "茂名", "肇庆", "惠州", "梅州", "汕尾", "河源", "阳江", "清远", "东莞", "中山", "潮州", "揭阳", "云浮"],
        "广西": ["南宁", "柳州", "桂林", "梧州", "北海", "防城港", "钦州", "贵港", "玉林", "百色", "贺州", "河池", "来宾", "崇左"],
        "贵州": ["贵阳", "六盘水", "遵义", "安顺", "毕节", "铜仁", "黔西南", "黔东南", "黔南"],
        "海南": ["海口", "三亚", "三沙", "儋州", "五指山", "琼海", "文昌", "万宁", "东方", "定安", "屯昌", "澄迈", "临高", "白沙", "昌江", "乐东", "陵水", "保亭", "琼中"],
        "河北": ["石家庄", "唐山", "秦皇岛", "邯郸", "邢台", "保定", "张家口", "承德", "沧州", "廊坊", "衡水"],
        "黑龙江": ["哈尔滨", "齐齐哈尔", "鸡西", "鹤岗", "双鸭山", "大庆", "伊春", "佳木斯", "七台河", "牡丹江", "黑河", "绥化", "大兴安岭"],
        "河南": ["郑州", "开封", "洛阳", "平顶山", "安阳", "鹤壁", "新乡", "焦作", "濮阳", "许昌", "漯河", "三门峡", "南阳", "商丘", "信阳", "周口", "驻马店", "济源"],
        "湖北": ["武汉", "黄石", "十堰", "宜昌", "襄阳", "鄂州", "荆门", "孝感", "荆州", "黄冈", "咸宁", "随州", "恩施", "仙桃", "潜江", "天门", "神农架"],
        "湖南": ["长沙", "株洲", "湘潭", "衡阳", "邵阳", "岳阳", "常德", "张家界", "益阳", "郴州", "永州", "怀化", "娄底", "湘西"],
        "吉林": ["长春", "吉林", "四平", "辽源", "通化", "白山", "松原", "白城", "延边"],
        "江苏": ["南京", "无锡", "徐州", "常州", "苏州", "南通", "连云港", "淮安", "盐城", "扬州", "镇江", "泰州", "宿迁"],
        "江西": ["南昌", "景德镇", "萍乡", "九江", "新余", "鹰潭", "赣州", "吉安", "宜春", "抚州", "上饶"],
        "辽宁": ["沈阳", "大连", "鞍山", "抚顺", "本溪", "丹东", "锦州", "营口", "阜新", "辽阳", "盘锦", "铁岭", "朝阳", "葫芦岛"],
        "内蒙古": ["呼和浩特", "包头", "乌海", "赤峰", "通辽", "鄂尔多斯", "呼伦贝尔", "巴彦淖尔", "乌兰察布", "兴安", "锡林郭勒", "阿拉善"],
        "宁夏": ["银川", "石嘴山", "吴忠", "固原", "中卫"],
        "青海": ["西宁", "海东", "海北", "黄南", "海南", "果洛", "玉树", "海西"],
        "山东": ["济南", "青岛", "淄博", "枣庄", "东营", "烟台", "潍坊", "济宁", "泰安", "威海", "日照", "临沂", "德州", "聊城", "滨州", "菏泽"],
        "山西": ["太原", "大同", "阳泉", "长治", "晋城", "朔州", "晋中", "运城", "忻州", "临汾", "吕梁"],
        "陕西": ["西安", "铜川", "宝鸡", "咸阳", "渭南", "延安", "汉中", "榆林", "安康", "商洛"],
        "上海": ["上海"],
        "四川": ["成都", "自贡", "攀枝花", "泸州", "德阳", "绵阳", "广元", "遂宁", "内江", "乐山", "南充", "眉山", "宜宾", "广安", "达州", "雅安", "巴中", "资阳", "阿坝", "甘孜", "凉山"],
        "台湾": ["台北", "新北", "桃园", "台中", "台南", "高雄", "基隆", "新竹", "嘉义", "苗栗", "彰化", "南投", "云林", "屏东", "宜兰", "花莲", "台东", "澎湖", "金门", "连江"],
        "天津": ["天津"],
        "西藏": ["拉萨", "日喀则", "昌都", "林芝", "山南", "那曲", "阿里"],
        "新疆": ["乌鲁木齐", "克拉玛依", "吐鲁番", "哈密", "昌吉", "博尔塔拉", "巴音郭楞", "阿克苏", "克孜勒苏", "喀什", "和田", "伊犁", "塔城", "阿勒泰", "石河子", "阿拉尔", "图木舒克", "五家渠", "北屯", "铁门关", "双河", "可克达拉", "昆玉", "胡杨河", "新星"],
        "香港": ["香港"],
        "云南": ["昆明", "曲靖", "玉溪", "保山", "昭通", "丽江", "普洱", "临沧", "楚雄", "红河", "文山", "西双版纳", "大理", "德宏", "怒江", "迪庆"],
        "浙江": ["杭州", "宁波", "温州", "嘉兴", "湖州", "绍兴", "金华", "衢州", "舟山", "台州", "丽水"]
    };

    // 分组渲染侧边栏
    const provGroups = [
        { title: "A-G", provs: ["安徽", "澳门", "北京", "重庆", "福建", "甘肃", "广东", "广西", "贵州"] },
        { title: "H-J", provs: ["海南", "河北", "黑龙江", "河南", "湖北", "湖南", "吉林", "江苏", "江西"] },
        { title: "L-S", provs: ["辽宁", "内蒙古", "宁夏", "青海", "山东", "山西", "陕西", "上海", "四川"] },
        { title: "T-Z", provs: ["台湾", "天津", "西藏", "新疆", "香港", "云南", "浙江"] }
    ];

    function initSidebar() {
        const listDiv = document.getElementById('province-list');
        provGroups.forEach(group => {
            let html = `<div class="category"><h4>${group.title}</h4><div class="prov-grid">`;
            group.provs.forEach(p => {
                html += `<label><input type="checkbox" onchange="toggleProvince('${p}', this.checked)"> ${p}</label>`;
            });
            html += `</div></div>`;
            listDiv.insertAdjacentHTML('beforeend', html);
        });
    }

    // 1. 获取准确的全国市级 GeoJSON
    // 采用 github ECharts 开源地图数据（CDN加速）
    fetch('https://cdn.jsdelivr.net/gh/mouday/echarts-map@master/echarts-4.2.1-rc1-map/json/china-cities.json')
        .then(response => response.json())
        .then(data => {
            // 提取所有的市级名称，用于后续与省份联动
            allCitiesInMap = data.features.map(f => f.properties.name);
            echarts.registerMap('china_city', data);
            initSidebar();
            renderMap();
        }).catch(err => {
            alert("地图数据加载失败，请检查网络或刷新重试！");
        });

    function renderMap() {
        const option = {
            tooltip: { trigger: 'item', formatter: '{b}' },
            geo: {
                map: 'china_city',
                roam: true, // 支持缩放和拖拽
                zoom: 1.2,
                emphasis: { itemStyle: { areaColor: '#ffccc7' }, label: { show: true } },
                itemStyle: { areaColor: '#ffffff', borderColor: '#999', borderWidth: 0.5 },
                regions: Array.from(selectedCities).map(name => ({
                    name: name,
                    itemStyle: { areaColor: '#dc3545' } // 选中的红色
                }))
            }
        };
        chart.setOption(option);
    }

    // 2. 点击地图上某一个市的交互
    chart.on('click', function (params) {
        if (selectedCities.has(params.name)) {
            selectedCities.delete(params.name);
        } else {
            selectedCities.add(params.name);
        }
        renderMap();
    });

    // 3. 勾选左侧省份联动地图变色
    function toggleProvince(provName, isChecked) {
        const prefixes = provinceMap[provName] || [];
        // 在所有市级数据中，匹配属于该省的市
        const matchedCities = allCitiesInMap.filter(cityName => {
            return prefixes.some(prefix => cityName.includes(prefix));
        });

        matchedCities.forEach(city => {
            if (isChecked) {
                selectedCities.add(city);
            } else {
                selectedCities.delete(city);
            }
        });
        renderMap();
    }

    // 4. 导出 TXT 逻辑
    function exportData(type) {
        if (allCitiesInMap.length === 0) return alert("地图数据还未加载完毕，请稍等...");
        
        let result = [];
        if (type === 'red') {
            result = Array.from(selectedCities);
        } else {
            // 导出未选中的市
            result = allCitiesInMap.filter(c => !selectedCities.has(c));
        }
        
        if (result.length === 0) return alert("当前选择为空，没有可导出的数据！");
        
        const blob = new Blob([result.join('\n')], { type: 'text/plain;charset=utf-8' });
        const anchor = document.createElement('a');
        anchor.href = URL.createObjectURL(blob);
        anchor.download = type === 'red' ? '已选中的市级区域.txt' : '未选中的市级区域.txt';
        anchor.click();
    }

    // 5. 截图功能
    function takeScreenshot() {
        html2canvas(document.body).then(canvas => {
            const link = document.createElement('a');
            link.download = '中国市级地图截图.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    // 6. 重置全部
    function clearAll() {
        selectedCities.clear();
        document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
        renderMap();
    }

    // 窗口尺寸变化时重绘地图
    window.onresize = () => chart.resize();
</script>

</body>
</html>
